<VirtualHost *:80>
    ServerName structAcademy.meyer.today
    ServerAlias structacademy.meyer.today
    DocumentRoot /var/www/structAcademy

    <Directory /var/www/structAcademy>
        Options -Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/app_error.log
    CustomLog ${APACHE_LOG_DIR}/app_access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =structAcademy.meyer.today [OR]
    RewriteCond %{SERVER_NAME} =structacademy.meyer.today
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>